"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Button
group: Empire
status: stable
description: "A call-to-action link."
props:
  type: object
  properties:
    label:
      type: string
      title: Label
      examples:
        - "Set up Empire"
    url:
      type: string
      title: Link
      format: uri-reference
    variant:
      type: string
      title: Style
      enum: [primary, secondary, ghost, accent, light, outline]
      "meta:enum":
        primary: Primary
        secondary: Secondary
        ghost: Ghost
        accent: Accent
        light: Light
        outline: Outline
      default: primary
    size:
      type: string
      title: Size
      enum: [default, sm, lg]
      "meta:enum":
        default: Default
        sm: Small
        lg: Large
      default: default
