"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Heading
group: Empire
status: stable
description: "A section heading with an optional eyebrow label."
props:
  type: object
  properties:
    text:
      type: string
      title: Heading text
      examples:
        - "Latest videos"
    level:
      # h1 is reserved for the page/region title; a component heading must not
      # compete with it, so the editor can only choose h2–h4.
      type: integer
      title: Heading level
      enum: [2, 3, 4]
      default: 2
    eyebrow:
      type: string
      title: Eyebrow
      default: ""
