name: Empire
description: 'Paste your YouTube channel. Empire builds your video site. Turns a YouTube channel into a streaming-style video site using Feeds ingestion, Remote Video media, and editorial empire_video nodes.'
type: Site
recipes:
  # The Drupal CMS "Blank" baseline — admin UI, authentication, media
  # (incl. the remote_video media type Empire imports into), privacy/consent
  # (§19), SEO, and HTML email. Empire is a Site template built ON this
  # foundation; composing it here makes the recipe self-contained, so a
  # marketplace `composer require drupal/empire` + `drush recipe empire` (or an
  # installer-selected Empire) builds the full site instead of silently
  # depending on the baseline having been applied first. See DEVIATIONS.md for
  # the Site-on-Site rationale.
  - drupal_cms_site_template_base
  # Shared content-type foundations Empire's empire_video reuses: the
  # field_content body field + format, field_tags + the tags vocabulary, the
  # content_editor role, and pathauto. (Not pulled in by the baseline above.)
  - drupal_cms_content_type_base
  # Contact form + webform tooling + anti-spam.
  - drupal_cms_forms
install:
  # Core Help, so editors can reach the Empire guidance at Admin → Help (hook_help).
  - help
  - feeds
  - empire_theme
  - empire_tools
config:
  strict: false
  actions:
    system.theme:
      simpleConfigUpdate:
        default: empire_theme
    user.role.content_editor:
      grantPermissions:
        - 'access empire dashboard'
        - 'configure empire channel'
        - 'refresh empire imports'
        # Curate the imported videos (title, artwork, featured, collection).
        - 'create empire_video content'
        - 'edit any empire_video content'
        - 'delete any empire_video content'
    # Branded 404/403 pages (the app shell wraps these routes).
    system.site:
      simpleConfigUpdate:
        page.404: '/empire/page-not-found'
        page.403: '/empire/access-denied'
    # Empire lists videos on taxonomy term pages (collections via field_collection,
    # tags/channels via field_tags/field_channel) through the SHARED core
    # taxonomy_term view. Two narrow, vocabulary-safe tweaks are applied — kept
    # minimal so other vocabularies' term pages still render correctly:
    #  - hide videos flagged "hidden" (§25), via an OR group that PRESERVES
    #    non-video nodes: a tagged page has no field_source_status, so the group
    #    keeps it (field is empty) instead of silently dropping it;
    #  - a short, vocabulary-neutral empty-state message.
    # The header is left at the core default (the page-head h1 from the theme
    # names the term; the empire_collection self-tile is suppressed in full view
    # mode), and the page-head h1 covers every vocabulary's term pages.
    views.view.taxonomy_term:
      simpleConfigUpdate:
        'display.default.display_options.filter_groups':
          operator: AND
          groups:
            1: AND
            2: OR
        'display.default.display_options.filters.langcode.group': 1
        'display.default.display_options.filters.status.group': 1
        'display.default.display_options.filters.field_source_status_value':
          id: field_source_status_value
          table: node__field_source_status
          field: field_source_status_value
          entity_type: node
          entity_field: field_source_status
          plugin_id: list_field
          operator: not
          value:
            hidden: hidden
          group: 2
        'display.default.display_options.filters.field_source_status_null':
          id: field_source_status_null
          table: node__field_source_status
          field: field_source_status_value
          entity_type: node
          entity_field: field_source_status
          plugin_id: list_field
          operator: empty
          value: {  }
          group: 2
        'display.default.display_options.empty.area_text_custom':
          id: area_text_custom
          table: views
          field: area_text_custom
          relationship: none
          group_type: group
          admin_label: ''
          plugin_id: text_custom
          empty: true
          content: 'No videos here yet.'
          tokenize: false
